services:
  gps-worker:
    build: .
    image: gps-emulator
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./output:/app/output
    restart: "no"
    profiles:
      - worker

  gps-scheduler:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/compose
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    entrypoint: /bin/sh
    command: >
      -c "cd /compose && docker compose run --rm gps-worker node src/log-schedule.js && if [ -n \"${CRON_SCHEDULE}\" ]; then echo \"${CRON_SCHEDULE} cd /compose && docker compose run --rm gps-worker\" | crontab - && crond -f -l 2; else tail -f /dev/null; fi"
    restart: unless-stopped
